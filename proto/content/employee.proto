syntax = "proto3";

package pb;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/dinhtatuanlinh/source_proto";

message Employee {
  int64 employee_id = 1;
  string name = 2;
  optional string email = 3;
  optional google.protobuf.Timestamp birthdate = 4;
  optional string phone = 5;
  optional string position = 6;
  optional string department = 7;
  optional string picture_url = 8;
  optional string biography = 9;
  string status = 10;
  string title = 11;
  string en_title = 12;
  string en_position = 13;
  string en_biography = 14;
}